<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to Showcase — luxury marketplace POC demo." />
  <title>Sign In — Showcase</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="login">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Showcase</a>
      <nav class="nav-main" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="#">Consultation</a>
      </nav>
      <div class="header-actions">
        <div class="currency-toggle" data-currency-toggle>
          <button type="button" data-currency="USD" class="is-active">USD</button>
          <button type="button" data-currency="EUR">EUR</button>
        </div>
        <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 21s-8-5.4-8-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 5.6-8 11-8 11z"/></svg>
          <span class="badge hidden" data-wishlist-count>0</span>
        </a>
        <a href="cart.html" class="icon-btn" aria-label="Bag">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/><path d="M6 6L5 3H2"/></svg>
          <span class="badge hidden" data-cart-count>0</span>
        </a>
        <button type="button" class="menu-toggle" data-menu-toggle aria-label="Open menu"><span></span><span></span><span></span></button>
      </div>
    </div>
    <nav class="mobile-nav" data-mobile-nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="wishlist.html">Wishlist</a>
      <a href="#">Consultation</a>
      <a href="cart.html">Bag</a>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <p class="auth-eyebrow">Client access</p>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-note">POC demo — any email and password will sign you in.</p>

      <form class="auth-form" data-login-form novalidate>
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com" />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        </label>
        <div class="auth-form__row">
          <a href="#" class="auth-link" data-forgot-password>Forgot password?</a>
        </div>
        <button type="submit" class="btn btn--gold btn--block">Sign in</button>
      </form>

      <p class="auth-footer">
        <a href="index.html" class="auth-link">Continue as guest</a>
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <span>© 2026 Showcase. POC demo — not a secure login.</span>
    </div>
  </footer>

  <script src="products.js?v=e4f9b7d"></script>
  <script src="js/app.js" defer></script>
</body>
</html>
